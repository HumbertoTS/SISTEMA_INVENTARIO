<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Registrar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <div class="container mt-4">

        <div class="card">

            <div class="card-header">
                <h3>Registrar Producto</h3>
            </div>

            <div class="card-body">

                <form th:action="@{/producto/guardar}" th:object="${producto}" method="post">

                    <div class="mb-3">
                        <label class="form-label">
                            Código
                        </label>

                        <input type="text" class="form-control" th:field="*{codigoProducto}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Nombre
                        </label>

                        <input type="text" class="form-control" th:field="*{nombre}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Descripción
                        </label>

                        <textarea class="form-control" rows="3" th:field="*{descripcion}">
                </textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Unidad
                        </label>

                        <input type="text" class="form-control" th:field="*{unidad}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Categoría
                        </label>

                        <select class="form-select" th:field="*{categoriaId}" required>

                            <option value="">
                                Seleccione una categoría
                            </option>

                            <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}">
                            </option>

                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Guardar Producto
                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
