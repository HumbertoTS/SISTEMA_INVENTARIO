<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Inventario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>

<body class="bg-light">

    <!-- Barra superior -->
    <div th:replace="~{components/navbar :: navbar}"></div>

    <div class="container mt-4">

        <!-- Encabezado -->
        <div class="mb-4">
            <h2>Gestión de Productos</h2>
            <p class="text-muted">
                Administración y control de inventario.
            </p>
        </div>

        <!-- Botones de acción -->
        <div class="d-flex gap-2 mb-3">

            <a th:href="@{/producto/nuevo}" class="btn btn-success">
                + Nuevo Producto
            </a>

            <a th:href="@{/categoria/nuevo}" class="btn btn-secondary">
                + Nueva Categoría
            </a>

        </div>

        <div th:replace="~{components/busqueda :: busqueda(@{/producto/buscar},'Buscar por código o nombre')}">
        </div>

        <!-- Tabla -->
        <div class="card shadow-sm">

            <div class="card-header bg-white">
                <h5 class="mb-0">Listado de Productos</h5>
            </div>

            <div class="card-body">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>Código</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Unidad</th>
                            <th>Stock</th>
                            <th>Categoría</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos" th:fragment="tabla-productos">

                        <tr th:each="producto : ${productos}">
                            <td th:text="${producto.codigoProducto}"></td>
                            <td th:text="${producto.nombre}"></td>
                            <td th:text="${producto.descripcion}"></td>
                            <td th:text="${producto.unidad}"></td>

                            <td>
                                <span class="badge bg-info" th:text="${producto.stock}">
                                </span>
                            </td>

                            <td th:text="${producto.categoriaNombre}"></td>

                            <td class="text-center">

                                <a th:href="@{/producto/editar/{codigoProducto}(codigoProducto=${producto.codigoProducto})}"
                                    class="btn btn-warning btn-sm">
                                    Editar
                                </a>

                                <a th:href="@{/producto/eliminar/{codigoProducto}(codigoProducto=${producto.codigoProducto})}"
                                    class="btn btn-danger btn-sm">
                                    Eliminar
                                </a>

                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
