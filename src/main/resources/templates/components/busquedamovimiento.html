<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

    <div th:fragment="busquedamovimiento(actionUrl, placeholder)">

        <div class="row g-2 mb-3">

            <div class="col-md-10">

                <input type="text" name="codigo" class="form-control" th:placeholder="${placeholder}" th:attr="
                        hx-get=${actionUrl},
                        hx-target='#tabla-movimiento',
                        hx-trigger='keyup changed delay:300ms',
                        hx-swap='outerHTML'">

            </div>

            <div class="col-md-2">

                <a th:href="@{/movimiento/listar}" class="btn btn-secondary w-100">
                    Limpiar
                </a>

            </div>

        </div>

    </div>

</body>

</html>
