<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Productos</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	
	<!-- jQuery (requerido por DataTables) -->
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

	<!-- DataTables CSS y JS -->
	<link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
	<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
	<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Lista de Productos</h3>
        </div>
		
		<div class="mt-4 mb-3 ms-4 me-5">
		    <form th:action="@{/productos/lista}" method="get" class="d-flex">
		        <input type="text" name="keyword" class="form-control me-2" 
		               placeholder="Buscar por código o nombre..." 
		               th:value="${keyword}">
		        <button type="submit" class="btn btn-primary">Buscar</button>
				<a th:href="@{/productos/lista}" class="btn btn-secondary ms-2">Ver todos</a>
		    </form>
		</div>
		<div th:if="${keyword != null}">
		    <div class="alert alert-info">
		        Resultados para: <strong th:text="${keyword}"></strong>
		    </div>
		</div>

		<div th:if="${#lists.isEmpty(productos)}">
		    <div class="alert alert-warning">
		        No se encontraron productos para la búsqueda.
		    </div>
		</div>	
		
        <div class="card-body">			
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Stock</th>
                        <th>Unidad</th>
                        <th>Categoría</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Iteramos productos -->
                    <tr th:each="prod : ${productos}">
                        <td th:text="${prod.codigoProducto}"></td>
                        <td th:text="${prod.nombre}"></td>
                        <td th:text="${prod.descripcion}"></td>
                        <td th:text="${prod.stock}"></td>
                        <td th:text="${prod.unidad}"></td>
                        <td th:text="${prod.categoria.nombre}"></td>
                        <td>
                            <!-- Botón que abre el modal -->
                            <button type="button" 
                                    class="btn btn-warning btn-sm" 
                                    data-bs-toggle="modal" 
                                    th:data-bs-target="'#editarModal-' + ${prod.codigoProducto}">
                                Editar
                            </button>
                            <a th:href="@{/productos/eliminar/{codigo}(codigo=${prod.codigoProducto})}" 
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Seguro que deseas eliminar este producto?');">
                               Eliminar
                            </a>
                        </td>

                        <!-- Modal de edición -->
                        <div th:id="'editarModal-' + ${prod.codigoProducto}" class="modal fade" tabindex="-1">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header bg-warning">
                                        <h5 class="modal-title">Editar Producto</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                    </div>
                                    <div class="modal-body">
                                        <form th:action="@{/productos/actualizar}" method="post">
                                            <!-- Código como hidden -->
                                            <input type="hidden" name="codigoProducto" th:value="${prod.codigoProducto}" />

                                            <div class="mb-3">
                                                <label class="form-label">Nombre</label>
                                                <input type="text" name="nombre" th:value="${prod.nombre}" class="form-control" required>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Descripción</label>
                                                <input type="text" name="descripcion" th:value="${prod.descripcion}" class="form-control">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Stock</label>
                                                <input type="number" name="stock" th:value="${prod.stock}" class="form-control" required>
                                            </div>
											<div class="mb-3">
                                                <label class="form-label">Unidades</label>
                                                <input type="text" name="unidad" th:value="${prod.unidad}" class="form-control" required>
                                            </div>											
                                            <div class="mb-3">
                                                <label class="form-label">Categoría</label>
                                                <select name="categoria.idCategoria" class="form-select">
                                                    <option th:each="cat : ${categorias}" 
                                                            th:value="${cat.idCategoria}" 
                                                            th:text="${cat.nombre}"
                                                            th:selected="${prod.categoria.idCategoria == cat.idCategoria}">
                                                    </option>
                                                </select>
                                            </div>
                                            <div class="modal-footer">
                                                <button type="submit" class="btn btn-success">Actualizar</button>
                                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
window.addEventListener('load', function() {
    const input = document.querySelector('input[name="keyword"]');
    input.value = '';
});
</script>


</body>
</html>
