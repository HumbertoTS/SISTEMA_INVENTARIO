<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Productos</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Lista de Productos</h3>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Stock</th>
                        <th>Categoría</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Iteramos productos -->
                    <tr th:each="prod : ${productos}">
                        <td th:text="${prod.codigoProducto}"></td>
                        <td th:text="${prod.nombre}"></td>
                        <td th:text="${prod.descripcion}"></td>
                        <td th:text="${prod.stock}"></td>
                        <td th:text="${prod.categoria.nombre}"></td>
                        <td>
                            <!-- Botón que abre el modal -->
                            <button type="button" 
                                    class="btn btn-warning btn-sm" 
                                    data-bs-toggle="modal" 
                                    th:data-bs-target="'#editarModal-' + ${prod.codigoProducto}">
                                Editar
                            </button>
                            <a th:href="@{/productos/eliminar/{codigo}(codigo=${prod.codigoProducto})}" 
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Seguro que deseas eliminar este producto?');">
                               Eliminar
                            </a>
                        </td>

						                        <!-- Modal de edición -->
						                        <div th:id="'editarModal-' + ${prod.codigoProducto}" class="modal fade" tabindex="-1">
						                          <div class="modal-dialog">
						                            <div class="modal-content">
						                              <div class="modal-header bg-warning">
						                                <h5 class="modal-title">Editar Producto</h5>
						                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
						                              </div>
						                              <div class="modal-body">
						                                <form th:action="@{/productos/actualizar}" method="post">
						                                    <!-- Código como hidden -->
						                                    <input type="hidden" name="codigoProducto" th:value="${prod.codigoProducto}" />

						                                    <div class="mb-3">
						                                        <label class="form-label">Nombre</label>
						                                        <input type="text" name="nombre" th:value="${prod.nombre}" class="form-control" required>
						                                    </div>
						                                    <div class="mb-3">
						                                        <label class="form-label">Descripción</label>
						                                        <input type="text" name="descripcion" th:value="${prod.descripcion}" class="form-control">
						                                    </div>
						                                    <div class="mb-3">
						                                        <label class="form-label">Stock</label>
						                                        <input type="number" name="stock" th:value="${prod.stock}" class="form-control" required>
						                                    </div>
						                                    <div class="mb-3">
						                                        <label class="form-label">Categoría</label>
						                                        <select name="categoria.idCategoria" class="form-select">
						                                            <option th:each="cat : ${categorias}" 
						                                                    th:value="${cat.idCategoria}" 
						                                                    th:text="${cat.nombre}"
						                                                    th:selected="${prod.categoria.idCategoria == cat.idCategoria}">
						                                            </option>
						                                        </select>
						                                    </div>
						                                    <div class="modal-footer">
						                                        <button type="submit" class="btn btn-success">Actualizar</button>
						                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
						                                    </div>
						                                </form>
						                              </div>
						                            </div>
						                          </div>
						                        </div>
						                    </tr>
						                </tbody>
						            </table>
						        </div>
						    </div>
						</div>

						<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
						</body>
						</html>
