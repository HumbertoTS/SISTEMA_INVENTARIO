<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Nuevo Movimiento</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

    <h2>Registrar Movimiento</h2>

    <form th:action="@{/movimiento}" th:object="${movimiento}" method="post">
        <!-- Código del producto -->
        <div class="mb-3">
            <label class="form-label">Código Producto</label>
            <input type="text" th:field="*{producto.codigoProducto}" class="form-control" required>
        </div>

        <!-- Cantidad -->
        <div class="mb-3">
            <label class="form-label">Cantidad</label>
            <input type="number" th:field="*{cantidad}" class="form-control" required>
        </div>

        <!-- Tipo de movimiento -->
        <div class="mb-3">
            <label class="form-label">Tipo Movimiento</label>
            <select th:field="*{tipoMovimiento}" class="form-select" required>
                <option value="ENTRADA">ENTRADA</option>
                <option value="SALIDA">SALIDA</option>
            </select>
        </div>

        <!-- Observación -->
        <div class="mb-3">
            <label class="form-label">Observación</label>
            <textarea th:field="*{observacion}" class="form-control"></textarea>
        </div>

        <!-- Botones -->
        <button type="submit" class="btn btn-success">Guardar</button>
        <a th:href="@{/movimiento/listar}" class="btn btn-secondary">Cancelar</a>
    </form>

</body>
</html>
