<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Inventario - Movimientos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>

<body class="bg-light">

    <!-- Barra superior -->
    <div th:replace="~{components/navbar :: navbar}"></div>

    <div class="container mt-4">

        <!-- Encabezado -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-0">Gestión de Movimientos</h2>
                <p class="text-muted mb-0">
                    Registro y control de entradas y salidas de productos.
                </p>
            </div>

            <!-- Botón de regresar -->
            <a th:href="@{/inicio}" class="btn btn-primary">
                ⬅ Regresar
            </a>
        </div>

        <!-- Botones de acción -->
        <div class="d-flex gap-2 mb-3">
            <a th:href="@{/movimiento/nuevo}" class="btn btn-success">
                + Nuevo Movimiento
            </a>
            <a th:href="@{/producto/listar}" class="btn btn-secondary">
                Ver Productos
            </a>
        </div>

        <!-- Buscador -->
        <div th:replace="~{components/busquedamovimiento :: busquedamovimiento(@{/movimiento/buscar},'Buscar por código de producto')}"></div>

        <!-- Tabla -->
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">Listado de Movimientos</h5>
            </div>

            <div class="card-body">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th class="text-center">ID</th>
                            <th class="text-center">Código Producto</thclass="text-center">
							<th class="text-center">Nombre del Producto</th>
                            <th class="text-center">Usuario</th>
                            <th class="text-center">Tipo</th>
                            <th class="text-center">Cantidad</th>
                            <th class="text-center">Fecha</th>
                            <th class="text-center">Observación</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-movimiento" th:fragment="tabla-movimiento">
                        <tr th:each="mov : ${movimientos}">
                            <td class="text-center" th:text="${mov.id}"></td>
                            <td class="text-center" th:text="${mov.producto.codigoProducto}"></td>
							<td class="text-center" th:text="${mov.producto.nombre}"></td>
                            <td class="text-center" th:text="${mov.usuario.username}"></td>
                            <td class="text-center" th:text="${mov.tipoMovimiento}"></td>
                            <td class="text-center">
                                <span class="badge bg-info" th:text="${mov.cantidad}"></span>
                            </td>
                            <td class="text-center" th:text="${#temporals.format(mov.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                            <td class="text-center" th:text="${mov.observacion}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
